<div class="forgot-password-container">
  <div class="forgot-password-card glass-effect">
    <!-- Logo and Title -->
    <div class="text-center mb-4">
      <div class="logo mb-3">
        <i class="bi bi-key"></i>
      </div>
      <h1 class="heading-2">Forgot Password</h1>
      <p class="text-secondary">Reset your password securely</p>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="alert alert-success fade-in" role="alert">
      <i class="bi bi-check-circle me-2"></i>
      {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert alert-danger fade-in" role="alert">
      <i class="bi bi-exclamation-triangle me-2"></i>
      {{ errorMessage }}
    </div>

    <!-- OTP Sent State -->
    <div *ngIf="otpSent" class="otp-sent-state text-center mb-4">
      <div class="otp-icon mb-3">
        <i class="bi bi-envelope-check"></i>
      </div>
      <h3 class="otp-title">Check Your Email</h3>
      <p class="otp-description">
        We've sent a 6-digit OTP code to your email address.<br>
        Please enter it in the next step to reset your password.
      </p>
      <button class="btn btn-primary w-100 mb-3" (click)="resendOTP()">
        <i class="bi bi-arrow-clockwise me-2"></i>
        Resend OTP
      </button>
    </div>

    <!-- Forgot Password Form -->
    <form *ngIf="!otpSent" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="forgot-password-form">
      <!-- Email Field -->
      <div class="form-group mb-4">
        <label for="email" class="form-label">
          <i class="bi bi-envelope me-2"></i>Email Address
        </label>
        <input
          type="email"
          id="email"
          class="form-control input-custom"
          formControlName="email"
          placeholder="Enter your registered email"
          [class.is-invalid]="email?.invalid && email?.touched"
          autocomplete="email"
        >
        <div *ngIf="email?.invalid && email?.touched" class="invalid-feedback">
          {{ getEmailErrorMessage() }}
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn btn-primary w-100 mb-3"
        [disabled]="forgotPasswordForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">
          <i class="bi bi-send me-2"></i>
          Send OTP
        </span>
        <span *ngIf="isLoading">
          <span class="spinner spinner-border spinner-border-sm me-2" role="status"></span>
          Sending OTP...
        </span>
      </button>
    </form>

    <!-- Navigation Options -->
    <div class="navigation-options mt-4">
      <div class="text-center">
        <a 
          routerLink="/auth/login" 
          class="text-primary text-decoration-none"
        >
          <i class="bi bi-arrow-left me-1"></i>
          Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
