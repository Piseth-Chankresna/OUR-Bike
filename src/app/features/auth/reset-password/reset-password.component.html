<div class="reset-password-container">
  <div class="reset-password-card glass-effect">
    <!-- Logo and Title -->
    <div class="text-center mb-4">
      <div class="logo mb-3">
        <i class="bi bi-key-fill"></i>
      </div>
      <h1 class="heading-2">Reset Password</h1>
      <p class="text-secondary">Create your new password</p>
    </div>

    <!-- Email Display -->
    <div class="email-display text-center mb-4">
      <i class="bi bi-envelope me-2"></i>
      <span>{{ email }}</span>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="alert alert-success fade-in" role="alert">
      <i class="bi bi-check-circle me-2"></i>
      {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert alert-danger fade-in" role="alert">
      <i class="bi bi-exclamation-triangle me-2"></i>
      {{ errorMessage }}
    </div>

    <!-- Reset Password Form -->
    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="reset-password-form">
      <!-- New Password Field -->
      <div class="form-group mb-3">
        <label for="newPassword" class="form-label">
          <i class="bi bi-lock me-2"></i>New Password
        </label>
        <input
          type="password"
          id="newPassword"
          class="form-control input-custom"
          formControlName="newPassword"
          placeholder="Enter new password"
          [class.is-invalid]="newPassword?.invalid && newPassword?.touched"
          autocomplete="new-password"
        >
        <div *ngIf="newPassword?.invalid && newPassword?.touched" class="invalid-feedback">
          {{ getNewPasswordErrorMessage() }}
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div class="form-group mb-4">
        <label for="confirmPassword" class="form-label">
          <i class="bi bi-lock-fill me-2"></i>Confirm Password
        </label>
        <input
          type="password"
          id="confirmPassword"
          class="form-control input-custom"
          formControlName="confirmPassword"
          placeholder="Confirm new password"
          [class.is-invalid]="confirmPassword?.invalid && confirmPassword?.touched"
          autocomplete="new-password"
        >
        <div *ngIf="confirmPassword?.invalid && confirmPassword?.touched" class="invalid-feedback">
          {{ getConfirmPasswordErrorMessage() }}
        </div>
      </div>

      <!-- Password Requirements -->
      <div class="password-requirements mb-4">
        <h6 class="requirements-title">Password Requirements:</h6>
        <ul class="requirements-list">
          <li [class.valid]="newPassword?.value?.length >= 6">
            <i class="bi" [class.bi-check-circle-fill]="newPassword?.value?.length >= 6" [class.bi-circle]="!(newPassword?.value?.length >= 6)"></i>
            At least 6 characters
          </li>
          <li [class.valid]="newPassword?.value === confirmPassword?.value && newPassword?.value">
            <i class="bi" [class.bi-check-circle-fill]="newPassword?.value === confirmPassword?.value && newPassword?.value" [class.bi-circle]="!(newPassword?.value === confirmPassword?.value && newPassword?.value)"></i>
            Passwords match
          </li>
        </ul>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn btn-primary w-100 mb-3"
        [disabled]="resetPasswordForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">
          <i class="bi bi-check-circle me-2"></i>
          Reset Password
        </span>
        <span *ngIf="isLoading">
          <span class="spinner spinner-border spinner-border-sm me-2" role="status"></span>
          Resetting...
        </span>
      </button>
    </form>

    <!-- Navigation Options -->
    <div class="navigation-options mt-4">
      <div class="text-center">
        <a 
          (click)="goBack()" 
          class="text-primary text-decoration-none"
        >
          <i class="bi bi-arrow-left me-1"></i>
          Back to OTP Verification
        </a>
      </div>
    </div>
  </div>
</div>
